<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="infinityGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle with shadow -->
  <circle cx="32" cy="32" r="31" fill="url(#bgGradient)"/>

  <!-- DevOps Infinity Symbol (∞) -->
  <path d="M 18 32 C 18 27, 21 24, 25 24 C 29 24, 31 27, 32 29 C 33 27, 35 24, 39 24 C 43 24, 46 27, 46 32 C 46 37, 43 40, 39 40 C 35 40, 33 37, 32 35 C 31 37, 29 40, 25 40 C 21 40, 18 37, 18 32 Z"
        fill="none" stroke="url(#infinityGradient)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left gear accent -->
  <g transform="translate(20, 15)">
    <circle cx="0" cy="0" r="3" fill="#fbbf24" opacity="0.9"/>
    <path d="M -1 -4 L -1 4 M -4 -1 L 4 -1" stroke="#fbbf24" stroke-width="1.2" opacity="0.9"/>
  </g>

  <!-- Right gear accent -->
  <g transform="translate(44, 49)">
    <circle cx="0" cy="0" r="3" fill="#34d399" opacity="0.9"/>
    <path d="M -1 -4 L -1 4 M -4 -1 L 4 -1" stroke="#34d399" stroke-width="1.2" opacity="0.9"/>
  </g>

  <!-- Pipeline dots (CI/CD concept) -->
  <circle cx="14" cy="32" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="50" cy="32" r="1.5" fill="white" opacity="0.8"/>
</svg>

