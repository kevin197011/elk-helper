<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Modern gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1677ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ed1;stop-opacity:1" />
    </linearGradient>
    <!-- Letter gradient -->
    <linearGradient id="kGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f4ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bgGradient)"/>
  
  <!-- Letter K - minimalist design -->
  <g transform="translate(32, 32)">
    <!-- K letter -->
    <path d="M -12 -16 L -12 16 M -12 0 L 8 -16 M -12 0 L 8 16" 
          stroke="url(#kGradient)" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Subtle accent -->
    <circle cx="12" cy="-8" r="2.5" fill="url(#kGradient)" opacity="0.7"/>
  </g>
</svg>
