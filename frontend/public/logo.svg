<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: DevOps Infinity Symbol -->
  <g transform="translate(15, 25)">
    <!-- Infinity loop -->
    <path d="M -10 0 C -10 -4, -8 -6, -5 -6 C -2 -6, 0 -4, 1 -2 C 2 -4, 4 -6, 7 -6 C 10 -6, 12 -4, 12 0 C 12 4, 10 6, 7 6 C 4 6, 2 4, 1 2 C 0 4, -2 6, -5 6 C -8 6, -10 4, -10 0 Z"
          fill="none" stroke="url(#logoGradient)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Small gear teeth -->
    <circle cx="-8" cy="-8" r="1.5" fill="#fbbf24"/>
    <circle cx="10" cy="8" r="1.5" fill="#34d399"/>
  </g>

  <!-- Vertical separator line -->
  <line x1="38" y1="12" x2="38" y2="38" stroke="white" stroke-width="0.5" opacity="0.3"/>

  <!-- ELK Helper text -->
  <text x="48" y="23" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="16" font-weight="700" fill="url(#textGradient)" letter-spacing="0.5">ELK</text>
  <text x="48" y="36" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="10" font-weight="500" fill="white" opacity="0.8" letter-spacing="1.2">HELPER</text>

  <!-- DevOps badge -->
  <g transform="translate(125, 25)">
    <rect x="-20" y="-10" width="40" height="20" rx="10" fill="#059669" opacity="0.9"/>
    <text x="0" y="3" font-family="'Inter', -apple-system, sans-serif"
          font-size="9" font-weight="600" fill="white" text-anchor="middle" letter-spacing="0.3">DevOps</text>
  </g>

  <!-- Pipeline indicator dots -->
  <g opacity="0.6">
    <circle cx="95" cy="25" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="25" r="1.5" fill="#8b5cf6"/>
    <circle cx="105" cy="25" r="1.5" fill="#34d399"/>
  </g>
</svg>

