<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <defs>
    <!-- Modern gradient -->
    <linearGradient id="kGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1677ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ed1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1677ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ed1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Letter K -->
  <g transform="translate(8, 8)">
    <!-- K letter - minimalist design -->
    <path d="M 0 0 L 0 34 M 0 17 L 12 0 M 0 17 L 12 34" 
          stroke="url(#kGradient)" 
          stroke-width="4" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Subtle accent dot -->
    <circle cx="16" cy="8" r="2" fill="url(#kGradient)" opacity="0.6"/>
  </g>

  <!-- Vertical separator -->
  <line x1="42" y1="12" x2="42" y2="38" stroke="url(#textGradient)" stroke-width="1.5" opacity="0.3"/>

  <!-- ELK Helper text -->
  <g transform="translate(52, 0)">
    <text x="0" y="22" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif"
          font-size="18" font-weight="700" fill="url(#textGradient)" letter-spacing="1">
      ELK
    </text>
    <text x="0" y="38" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif"
          font-size="10" font-weight="500" fill="url(#textGradient)" opacity="0.8" letter-spacing="2">
      HELPER
    </text>
  </g>
</svg>
